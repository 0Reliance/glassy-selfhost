# Optional overlay: auto-update the Glassy container when a new image is
# published to GHCR. Watchtower polls once a day, pulls the new `:latest`
# image, and recreates the container with the same config + volumes.
#
#   docker compose -f docker-compose.yml -f docker-compose.watchtower.yml up -d
#
# Pin GLASSY_TAG to a specific version in .env if you prefer manual upgrades;
# Watchtower only updates containers whose tag actually moves (`latest` does).
name: glassy-selfhost
services:
  watchtower:
    image: containrrr/watchtower:latest
    container_name: glassy-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Poll daily (in seconds). Raise/lower to taste.
      - WATCHTOWER_POLL_INTERVAL=86400
      # Remove old images after updating to reclaim disk.
      - WATCHTOWER_CLEANUP=true
      # Only manage containers in this compose project (label-scoped).
      - WATCHTOWER_LABEL_ENABLE=true
    command: []

  glassy:
    # Opt this container in to Watchtower management.
    labels:
      - com.centurylinklabs.watchtower.enable=true
