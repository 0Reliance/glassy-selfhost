# Optional overlay: run Ollama as a sidecar so local AI works with zero
# separate install. Compose it alongside the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.ollama.yml up -d
#
# Then pull a model once (downloads into the ollama-models volume):
#
#   docker compose -f docker-compose.yml -f docker-compose.ollama.yml \
#     exec ollama ollama pull llama3.2
#
# GPU: to use an NVIDIA GPU, install the NVIDIA Container Toolkit on the host
# and uncomment the `deploy.resources.reservations.devices` block below.
name: glassy-selfhost
services:
  glassy:
    # Point Glassy at the sidecar instead of the host. `ollama` resolves on the
    # compose network; no loopback rewrite needed.
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: glassy-ollama
    restart: unless-stopped
    # Expose on the host too, so other tools can share the same model store.
    ports: ['11434:11434']
    volumes: ['ollama-models:/root/.ollama']
    # --- NVIDIA GPU (optional) — requires NVIDIA Container Toolkit on the host.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-models: {}
