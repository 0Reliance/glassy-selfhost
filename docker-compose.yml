# Glassy — self-hosted (local machine). Obsidian + local services reachable.
# Copy .env.example to .env and fill in JWT_SECRET + API_KEY_ENCRYPTION_KEY,
# then `docker compose up -d`. See README.md for the full quick start.
name: glassy-selfhost
services:
  glassy:
    image: ghcr.io/0reliance/glassy-dash:${GLASSY_TAG:-latest}
    container_name: glassy
    restart: unless-stopped
    ports: ['3000:8080']
    env_file: [.env]
    environment:
      - NODE_ENV=production
      - DB_FILE=/app/data/notes.db
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - API_KEY_ENCRYPTION_KEY=${API_KEY_ENCRYPTION_KEY:?set API_KEY_ENCRYPTION_KEY}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # Identity: activates single-user gating (no registration, no commerce,
      # owner auto-unlocked). Do not change.
      - INSTANCE_ID=self_hosted
      - INSTANCE_ACCESS_MODE_DEFAULT=private
      - DEPLOYMENT_LOCALITY=local
      - ENABLE_MCP_SERVER=true
      - ENABLE_AGENT_GATEWAY=true
      - OBSIDIAN_HOST_OVERRIDE=host.docker.internal
    extra_hosts: ['host.docker.internal:host-gateway']
    volumes: ['glassy-data:/app/data']
volumes: { glassy-data: {} }
