# Glassy — self-hosted (local machine). Obsidian + local services reachable.
# Copy .env.example to .env and fill in the required fields (membership email,
# pairing token, secrets). Clear members also set GLASSY_VERIFY_CLOUD_URL.
# Then `docker compose up -d`. See README.md for the full quick start.
#
# MAINTAINERS: The source of truth is glassy/deploy/selfhost/docker-compose.yml.
# See MAINTAINING.md for the sync process.
name: glassy-selfhost
services:
  glassy:
    image: ghcr.io/0reliance/glassy-dash:${GLASSY_TAG:-latest}
    container_name: glassy
    restart: unless-stopped
    ports: ['${APP_PORT:-3000}:8080']
    env_file: [.env]
    environment:
      - NODE_ENV=production
      - DB_FILE=/app/data/notes.db
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET}
      - API_KEY_ENCRYPTION_KEY=${API_KEY_ENCRYPTION_KEY:?set API_KEY_ENCRYPTION_KEY}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # Membership gate: your Glassy account email (Clear or Pro).
      # The appliance verifies this against the cloud on first boot and
      # caches the result for 30 days. Required — container will not start
      # without a verified membership.
      - GLASSY_MEMBER_EMAIL=${GLASSY_MEMBER_EMAIL:?set GLASSY_MEMBER_EMAIL to your Glassy membership email}
      # Self-host pairing token (required). Generate one in your Glassy
      # account under Settings → Self-hosting and paste it here.
      #   • Public/Pro: https://app.glassy.fyi/#/settings?g=account&s=selfhost
      #   • Clear members: https://clear.glassy.fyi/#/settings?g=account&s=selfhost
      # Prevents anyone who merely knows your email from spinning up an
      # unlocked instance using your membership.
      - GLASSY_SELFHOST_TOKEN=${GLASSY_SELFHOST_TOKEN:?set GLASSY_SELFHOST_TOKEN — generate one in your Glassy account under Settings → Self-hosting}
      # Cloud verification URL. Defaults to the public SaaS (app.glassy.fyi).
      # Clear members must set this to https://clear.glassy.fyi so the
      # appliance verifies against the cloud where their account lives.
      - GLASSY_VERIFY_CLOUD_URL=${GLASSY_VERIFY_CLOUD_URL:-https://app.glassy.fyi}
      # Identity: activates single-user gating (no registration, no commerce,
      # owner auto-unlocked). Hardcoded here (not a ${VAR} substitution) so
      # it cannot be overridden via .env. Even if someone runs the public GHCR
      # image with `-e INSTANCE_ID=self_hosted`, they still cannot pass the
      # membership gate without a valid GLASSY_SELFHOST_TOKEN — the token
      # requirement is what protects the public image, not this env var.
      - INSTANCE_ID=self_hosted
      - INSTANCE_ACCESS_MODE_DEFAULT=private
      # Operational flags — safe to override in .env:
      - DEPLOYMENT_LOCALITY=${DEPLOYMENT_LOCALITY:-local}
      - ENABLE_MCP_SERVER=${ENABLE_MCP_SERVER:-true}
      - ENABLE_AGENT_GATEWAY=${ENABLE_AGENT_GATEWAY:-true}
      - OBSIDIAN_HOST_OVERRIDE=${OBSIDIAN_HOST_OVERRIDE:-host.docker.internal}
      # Single-user appliance gains nothing from multi-worker and the
      # cluster-mode fork race during initializeDatabase() produces noisy
      # first-boot worker churn. Pin to 1 worker for deterministic seeding
      # and clean first-boot logs (see Round 3 beta critique).
      - CLUSTER_WORKERS=1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    extra_hosts: ['host.docker.internal:host-gateway']
    volumes: ['glassy-data:/app/data']
volumes: { glassy-data: {} }
